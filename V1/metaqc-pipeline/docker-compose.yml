services:
  backend:
    build: ./backend
    container_name: metaqc-backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - PYTHONUNBUFFERED=1
    volumes:
      - ~/.ssh:/home/appuser/.ssh:ro

  frontend:
    build: ./frontend
    container_name: metaqc-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    depends_on:
      - backend
