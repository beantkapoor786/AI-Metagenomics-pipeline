services:
  backend:
    build: ./backend
    container_name: metaqc-backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - PYTHONUNBUFFERED=1
      - METAQC_DB=/data/metaqc_history.db
    volumes:
      - ~/.ssh:/home/appuser/.ssh:ro
      - metaqc-data:/data

  frontend:
    build: ./frontend
    container_name: metaqc-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  metaqc-data:
    driver: local
